name: MLOps Resource Gatekeeper

on:
  push:
    branches:
      - main
      - '**' # Triggers on all branches to test the branch protection condition

jobs:
  # 1. Dependency: Lightweight linter job
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Linter
        run: |
          echo "Running flake8 / black to verify code integrity..."
          # Replace with your actual linting command, e.g., flake8 .
          echo "Linting passed."

  # 2. The expensive training job
  train:
    needs: linter
    runs-on: ubuntu-latest
    # Gatekeeper Logic: Must be on 'main' AND commit message must contain '[run-train]'
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: GPU Training Execution
        run: |
          echo "Allocating GPU resources and running train.py..."
          # python train.py
          
          # NOTE: To test the failure() step below, you can uncomment the next line:
          # exit 1 

      # 3. Create and upload logs ONLY if the training step fails
      - name: Generate Error Logs
        if: failure()
        run: |
          echo "Training failed. Capturing system and process logs..." > error_logs.txt

      - name: Upload Error Logs Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt
          retention-days: 5

      # 4. Final Cleanup Step
      - name: Cleanup Resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
